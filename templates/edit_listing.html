{% extends "base.html" %}
{% block title %}Edit Listing — Campus Marketplace{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">

    <div class="page-header">
      <h2><i class="bi bi-pencil me-2" style="color:var(--primary)"></i>Edit Listing</h2>
      <p class="text-muted mb-0">Update the details for <strong>{{ listing.title }}</strong>.</p>
    </div>

    <div class="card border-0 shadow-sm p-4" style="border-radius:var(--radius)">
      <form method="post" enctype="multipart/form-data">

        <div class="mb-3">
          <label class="form-label" for="title">Title <span class="text-danger">*</span></label>
          <input id="title" class="form-control" name="title"
                 value="{{ listing.title }}" required>
        </div>

        <div class="mb-3">
          <label class="form-label" for="category">Category <span class="text-danger">*</span></label>
          <select id="category" class="form-select" name="category" required>
            {% for c in categories %}
              <option value="{{ c }}" {% if c == listing.category %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="price">Price (&#8377;) <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text">&#8377;</span>
            <input id="price" class="form-control" type="number" step="0.01" min="0"
                   name="price" value="{{ listing.price }}" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="description">Description</label>
          <textarea id="description" class="form-control" name="description" rows="4">{{ listing.description or '' }}</textarea>
        </div>

        <div class="mb-4">
          <label class="form-label" for="image">Replace Photo</label>
          {% if listing.image %}
            <div class="mb-2">
              <img src="{{ url_for('static', filename='uploads/' + listing.image) }}"
                   style="height:80px;border-radius:6px;object-fit:cover" alt="current">
              <span class="text-muted small ms-2">Current photo</span>
            </div>
          {% endif %}
          <input id="image" class="form-control" type="file" name="image" accept=".png,.jpg,.jpeg">
          <div class="form-text">Leave blank to keep the current photo.</div>
        </div>

        <div class="d-grid gap-2">
          <button class="btn btn-primary" type="submit">
            <i class="bi bi-check-lg me-1"></i>Save Changes
          </button>
          <a href="{{ url_for('my_listings') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
