{% extends "base.html" %}
{% block content %}
<h3>{{ listing.title }}</h3>
{% if listing.image %}
<img src="{{ url_for('static', filename='uploads/' + listing.image) }}" class="img-fluid mb-2">
{% endif %}
<p>{{ listing.description }}</p>
<p><b>${{ listing.price }}</b></p>

{% if current_user.is_authenticated %}
<a href="/favorite/{{ listing.id }}" class="btn btn-warning btn-sm">Save</a>
<form method="post" action="/messages" class="mt-2">
  <input type="hidden" name="receiver_id" value="{{ listing.user_id }}">
  <input type="hidden" name="listing_id" value="{{ listing.id }}">
  <textarea class="form-control mb-2" name="text" placeholder="Message seller"></textarea>
  <button class="btn btn-success btn-sm">Send Message</button>
</form>
{% endif %}
{% endblock %}
