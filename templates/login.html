{% extends "base.html" %}
{% block title %}Login — Campus Marketplace{% endblock %}

{% block content %}
<div class="auth-card">
  <h2><i class="bi bi-person-circle me-2"></i>Login</h2>
  <form method="post">
    <div class="mb-3">
      <label class="form-label" for="username">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input id="username" class="form-control" name="username" placeholder="Enter username" required autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label" for="password">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input id="password" class="form-control" type="password" name="password" placeholder="Enter password" required>
      </div>
    </div>
    <button class="btn btn-primary w-100" type="submit">Login</button>
  </form>
  <p class="text-center text-muted mt-3 mb-0" style="font-size:.9rem">
    Don't have an account? <a href="{{ url_for('register') }}">Register</a>
  </p>
</div>
{% endblock %}
